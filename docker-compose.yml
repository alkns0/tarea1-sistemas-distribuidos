services:

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    networks:
      - app-net

  response_generator:
    build: ./response_generator
    environment:
      - DATA_PATH=/data/buildings.csv
      - FAILURE_RATE=0.2
    volumes:
      - ./data:/data
    networks:
      - app-net
    ports:
      - "8001:8001"

  metrics_service:
    build: ./metrics_service
    networks:
      - app-net
    ports:
      - "8002:8002"

  cache_service:
    build: ./cache_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_TTL=300
    depends_on:
      - redis
    networks:
      - app-net
    ports:
      - "8000:8000"

  kafka_consumer:
    build: ./kafka_consumer
    environment:
      - KAFKA_SERVER=kafka:9092
      - CACHE_SERVICE_URL=http://cache_service:8000
      - RESPONSE_GENERATOR_URL=http://response_generator:8001
      - METRICS_URL=http://metrics_service:8002
    depends_on:
      - kafka
      - cache_service
      - response_generator
    networks:
      - app-net

  traffic_generator:
    build: ./traffic_generator
    environment:
      - KAFKA_SERVER=kafka:9092
      - DISTRIBUTION=zipf
      - NUM_REQUESTS=1000
      - RATE=10
    depends_on:
      - kafka
    networks:
      - app-net

networks:
  app-net:
    driver: bridge